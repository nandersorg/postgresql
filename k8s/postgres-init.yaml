apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init
  namespace: postgresql
data:
  01-init-schemas.sh: |
    #!/bin/bash
    set -e

    # 1. Maak de fysieke databases en users aan (uitgevoerd op de hoofd-db 'postgres')
    psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname "$POSTGRES_DB" <<-EOSQL
      -- Maak users aan als ze nog niet bestaan
      DO \$\$
      BEGIN
        IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'airflow') THEN
          CREATE USER airflow WITH PASSWORD '$AIRFLOW_DB_PASSWORD';
        END IF;
        IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'ml_platform') THEN
          CREATE USER ml_platform WITH PASSWORD '$ML_PLATFORM_DB_PASSWORD';
        END IF;
      END
      \$\$;

      -- Maak dedicated databases aan voor de applicaties
      SELECT 'CREATE DATABASE airflow' WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = 'airflow')\gexec
      SELECT 'CREATE DATABASE ml_platform' WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = 'ml_platform')\gexec

      -- Geef de users rechten op hun eigen database
      GRANT ALL PRIVILEGES ON DATABASE airflow TO airflow;
      GRANT ALL PRIVILEGES ON DATABASE ml_platform TO ml_platform;
    EOSQL

    # 2. Richt de 'ml_platform' database in (hier komen je applicatietabellen en NOS data)
    psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname "ml_platform" <<-EOSQL
      -- Rechten rechtzetten voor de user binnen deze db
      GRANT ALL ON SCHEMA public TO ml_platform;

      -- Je tabel voor de gescrapte NOS artikelen (is nu onderdeel van je ML data platform!)
      CREATE TABLE IF NOT EXISTS articles (
        id SERIAL PRIMARY KEY,
        title TEXT NOT NULL,
        description TEXT,
        url TEXT,
        sentiment VARCHAR(10) NOT NULL CHECK (sentiment IN ('POSITIVE', 'NEGATIVE')),
        scraped_at TIMESTAMP NOT NULL,
        created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
      );

      CREATE INDEX IF NOT EXISTS idx_articles_scraped_at ON articles(scraped_at DESC);
      CREATE INDEX IF NOT EXISTS idx_articles_sentiment ON articles(sentiment);
      CREATE INDEX IF NOT EXISTS idx_articles_created_at ON articles(created_at DESC);

      -- ML Platform specifieke tabellen
      CREATE TABLE IF NOT EXISTS models (
        id SERIAL PRIMARY KEY,
        name TEXT NOT NULL UNIQUE,
        version TEXT,
        framework TEXT,
        path TEXT,
        created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
      );

      CREATE TABLE IF NOT EXISTS training_runs (
        id SERIAL PRIMARY KEY,
        model_id INTEGER REFERENCES models(id) ON DELETE CASCADE,
        epoch INTEGER,
        loss FLOAT,
        accuracy FLOAT,
        val_loss FLOAT,
        val_accuracy FLOAT,
        timestamp TIMESTAMP DEFAULT CURRENT_TIMESTAMP
      );

      CREATE INDEX IF NOT EXISTS idx_training_runs_model_id ON training_runs(model_id);
      CREATE INDEX IF NOT EXISTS idx_training_runs_timestamp ON training_runs(timestamp DESC);

      -- Zorg dat de ml_platform user overal bij kan
      GRANT SELECT, INSERT, UPDATE, DELETE ON ALL TABLES IN SCHEMA public TO ml_platform;
      GRANT USAGE, SELECT ON ALL SEQUENCES IN SCHEMA public TO ml_platform;
    EOSQL

    # 3. Richt de 'airflow' database in (rechten openzetten zodat Airflow zelf zijn tabellen mag maken)
    psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname "airflow" <<-EOSQL
      GRANT ALL ON SCHEMA public TO airflow;
    EOSQL
