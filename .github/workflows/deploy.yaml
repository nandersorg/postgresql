name: Deploy PostgreSQL to MicroK8s

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Gefikst: Wacht nu op de postgresql namespace in plaats van airflow
      - name: Ensure namespace
        run: |
          microk8s kubectl apply -f k8s/namespace.yaml
          echo "Waiting for namespace to be active..."
          microk8s kubectl wait --for=create namespace/postgresql --timeout=15s

      - name: Create postgres-secret from GitHub Secrets
        run: |
          microk8s kubectl create secret generic postgres-secret \
            --from-literal=POSTGRES_PASSWORD='${{ secrets.POSTGRES_PASSWORD }}' \
            --from-literal=AIRFLOW_DB_PASSWORD='${{ secrets.AIRFLOW_DB_PASSWORD }}' \
            --from-literal=ML_PLATFORM_DB_PASSWORD='${{ secrets.ML_PLATFORM_DB_PASSWORD }}' \
            --namespace=postgresql \
            --dry-run=client -o yaml | microk8s kubectl apply -f -

      - name: Apply init ConfigMap
        run: |
          microk8s kubectl apply -f k8s/postgres-init.yaml

      - name: Apply PostgreSQL manifest
        run: |
          microk8s kubectl apply -f k8s/postgres.yaml

      # Gefikst: Namespace aangepast van airflow naar postgresql
      - name: Wait for PVCs to bind
        run: |
          echo "Checking volume reservation status in postgresql namespace..."
          microk8s kubectl wait --namespace=postgresql \
            --for=jsonpath='{.status.phase}'=Bound \
            pvc --all --timeout=2m

      # NIEUW: Herstart postgres zodra de configmap of deployment wijzigt,
      # zodat het database-script opnieuw geëvalueerd wordt.
      - name: Trigger update refresh (Rollout Restart)
        run: |
          echo "Applying live updates to PostgreSQL pods..."
          microk8s kubectl rollout restart deployment/postgres -n postgresql

      # Gefikst: Vervangen door rollout status om hangen bij fouten te voorkomen
      - name: Wait for PostgreSQL to be ready
        run: |
          echo "Monitoring database startup and init scripts execution..."
          microk8s kubectl rollout status deployment/postgres -n postgresql --timeout=5m

      - name: Verify deployment
        if: always()
        run: |
          echo "=== PostgreSQL Deployment Status ==="
          microk8s kubectl get pods -n postgresql
          microk8s kubectl get svc -n postgresql
          echo ""
          echo "To connect from your machine:"
          echo "  microk8s kubectl port-forward -n postgresql svc/postgres 5432:5432"
          echo "  psql -h localhost -U postgres"
